<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Inquiries | The Galleria.Art Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header class="admin-header">
      <a class="brand-link" href="/">The Galleria.Art</a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/users/">Users / Accounts</a>
        <a href="/admin/artists/">Artists</a>
        <a href="/admin/media/">Media</a>
        <a aria-current="page" href="/admin/inquiries/">Inquiries</a>
        <a href="/admin/invitations/">Invitations</a>
        <a href="/admin/review/">Review</a>
        <a href="/admin/plans/">Plans / Billing</a>
        <a href="/admin/audit/">Audit</a>
        <a href="/admin/settings/">Settings</a>
      </nav>
      <form action="/admin/logout" method="post">
        <button class="admin-logout" type="submit">Logout</button>
      </form>
    </header>

    <main class="admin-dashboard" aria-labelledby="inquiries-title">
      <div class="admin-dashboard-heading">
        <div>
          <p class="section-kicker">Collector Routing</p>
          <h1 id="inquiries-title">Inquiries</h1>
          <p class="admin-muted">Logged in as {{ADMIN_EMAIL}}</p>
        </div>
      </div>

      <section class="admin-panel" aria-labelledby="inquiry-filter-title">
        <h2 id="inquiry-filter-title">Filter Inquiries</h2>
        <div class="inquiry-filter-grid">
          <label>
            <span>Status</span>
            <select id="inquiry-status-filter">
              <option value="">All statuses</option>
            </select>
          </label>
          <label>
            <span>Artist</span>
            <select id="inquiry-artist-filter">
              <option value="">All artists</option>
            </select>
          </label>
        </div>
      </section>

      <section class="admin-panel" aria-labelledby="inquiry-list-title">
        <h2 id="inquiry-list-title">Inquiry List</h2>
        <div class="admin-table-wrap">
          <table class="admin-table inquiry-table">
            <thead>
              <tr>
                <th>Visitor</th>
                <th>Related To</th>
                <th>Status</th>
                <th>Created</th>
                <th>Source</th>
                <th>Message</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inquiries-table"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel" aria-labelledby="inquiry-detail-title">
        <h2 id="inquiry-detail-title">Inquiry Detail</h2>
        <div id="inquiry-detail"></div>
      </section>
    </main>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
