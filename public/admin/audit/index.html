<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Audit Log | The Galleria.Art Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header class="admin-header">
      <a class="brand-link" href="/">The Galleria.Art</a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/users/">Users</a>
        <a href="/admin/artists/">Artists</a>
        <a href="/admin/galleries/">Galleries</a>
        <a href="/admin/artwork/">Artwork</a>
        <a href="/admin/media/">Media</a>
        <a href="/admin/inquiries/">Inquiries</a>
        <a href="/admin/invitations/">Invitations</a>
        <a href="/admin/review/">Review</a>
        <a href="/admin/plans/">Plans</a>
        <a aria-current="page" href="/admin/audit/">Audit</a>
        <a href="/admin/settings/">Settings</a>
      </nav>
      <form action="/admin/logout" method="post">
        <button class="admin-logout" type="submit">Logout</button>
      </form>
    </header>

    <main class="admin-dashboard" aria-labelledby="audit-title">
      <div class="admin-dashboard-heading">
        <div>
          <p class="section-kicker">Operational Visibility</p>
          <h1 id="audit-title">Audit Log</h1>
          <p class="admin-muted">Logged in as {{ADMIN_EMAIL}}</p>
        </div>
      </div>

      <section class="admin-panel" aria-labelledby="audit-list-title">
        <h2 id="audit-list-title">Recent Events</h2>
        <div class="inquiry-filter-grid">
          <label>
            <span>Action</span>
            <input id="audit-action-filter" placeholder="review.published">
          </label>
          <label>
            <span>Target Type</span>
            <input id="audit-target-filter" placeholder="artist, inquiry, media">
          </label>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Actor</th>
                <th>Action</th>
                <th>Target</th>
                <th>Summary</th>
              </tr>
            </thead>
            <tbody id="audit-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
