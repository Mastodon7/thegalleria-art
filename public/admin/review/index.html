<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Review Queue | The Galleria.Art Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header class="admin-header">
      <a class="brand-link" href="/">The Galleria.Art</a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/users/">Users</a>
        <a href="/admin/artists/">Artists</a>
        <a href="/admin/galleries/">Galleries</a>
        <a href="/admin/artwork/">Artwork</a>
        <a href="/admin/media/">Media</a>
        <a href="/admin/inquiries/">Inquiries</a>
        <a href="/admin/invitations/">Invitations</a>
        <a aria-current="page" href="/admin/review/">Review</a>
        <a href="/admin/plans/">Plans</a>
        <a href="/admin/audit/">Audit</a>
        <a href="/admin/settings/">Settings</a>
      </nav>
      <form action="/admin/logout" method="post">
        <button class="admin-logout" type="submit">Logout</button>
      </form>
    </header>

    <main class="admin-dashboard" aria-labelledby="review-title">
      <div class="admin-dashboard-heading">
        <div>
          <p class="section-kicker">Publishing Workflow</p>
          <h1 id="review-title">Review Queue</h1>
          <p class="admin-muted">Logged in as {{ADMIN_EMAIL}}</p>
        </div>
      </div>

      <section class="admin-panel" aria-labelledby="review-list-title">
        <h2 id="review-list-title">Review Items</h2>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Type</th>
                <th>Artist</th>
                <th>Title</th>
                <th>Status</th>
                <th>Submitted</th>
                <th>Preview</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="review-table"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel" aria-labelledby="review-detail-title">
        <h2 id="review-detail-title">Review Detail</h2>
        <div id="review-detail"></div>
      </section>
    </main>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
