<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Plans | The Galleria.Art Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header class="admin-header">
      <a class="brand-link" href="/">The Galleria.Art</a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/users/">Users / Accounts</a>
        <a href="/admin/artists/">Artists</a>
        <a href="/admin/media/">Media</a>
        <a href="/admin/inquiries/">Inquiries</a>
        <a href="/admin/invitations/">Invitations</a>
        <a href="/admin/review/">Review</a>
        <a href="/admin/plans/" aria-current="page">Plans / Billing</a>
        <a href="/admin/audit/">Audit</a>
        <a href="/admin/settings/">Settings</a>
      </nav>
      <form action="/admin/logout" method="post">
        <button class="admin-logout" type="submit">Logout</button>
      </form>
    </header>

    <main class="admin-dashboard" aria-labelledby="plans-title">
      <div class="admin-dashboard-heading">
        <div>
          <p class="section-kicker">Billing Foundation</p>
          <h1 id="plans-title">Plans</h1>
          <p class="admin-muted">Logged in as {{ADMIN_EMAIL}}</p>
        </div>
        <button class="admin-primary-action" id="add-plan" type="button">Add Plan</button>
      </div>

      <section class="admin-panel">
        <h2>Plan List</h2>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Slug</th>
                <th>Monthly</th>
                <th>Annual</th>
                <th>Status</th>
                <th>Limits</th>
                <th>Stripe Mapping</th>
                <th>Order</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="plans-table"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel">
        <h2>Plan Edit</h2>
        <form class="admin-record-form" id="plan-form"></form>
        <button class="admin-primary-action" type="submit" form="plan-form">Save Plan</button>
      </section>
    </main>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
