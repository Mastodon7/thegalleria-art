<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Billing | The Galleria.Art Artist Portal</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page artist-portal-page" data-artist-view="billing">
  <div class="admin-shell">
    <header class="admin-header">
      <a class="brand-link" href="/">The Galleria.Art</a>
      <nav class="admin-nav artist-nav" aria-label="Artist navigation">
        <a href="/artist/">Dashboard</a>
        <a href="/artist/profile/">Profile</a>
        <a href="/artist/galleries/">Galleries</a>
        <a href="/artist/artwork/">Artwork</a>
        <a href="/artist/media/">Media</a>
        <a href="/artist/inquiries/">Inquiries</a>
        <a aria-current="page" href="/artist/billing/">Billing</a>
        <a id="artist-public-view" href="/">Public View</a>
      </nav>
      <form action="/artist/logout" method="post">
        <button class="admin-logout" type="submit">Logout</button>
      </form>
    </header>

    <main class="admin-dashboard" aria-labelledby="artist-billing-title">
      <div class="admin-dashboard-heading">
        <div>
          <p class="section-kicker">Artist Portal</p>
          <h1 id="artist-billing-title">Billing</h1>
          <p class="admin-muted">Logged in as {{ARTIST_EMAIL}}</p>
        </div>
      </div>

      <section class="admin-panel">
        <h2>Current Plan</h2>
        <div class="review-status-panel" id="artist-billing-panel"></div>
      </section>
    </main>
  </div>
  <script src="/artist/artist.js"></script>
</body>
</html>
